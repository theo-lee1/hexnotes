name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:
  repository_dispatch:
    types:
      - content-updated

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout content
        uses: actions/checkout@v4
        with:
          repository: theo-lee1/hexnotes-content
          path: content
          token: ${{ secrets.HEXNOTES_CONTENT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          SITE_URL: https://www.hexnotes.cc
          CONTENT_DIR: ./content
        run: npm run build

      - name: Commit category colors
        run: |
          if [ -n "$(git -C content status --porcelain -- category-colors.json)" ]; then
            git -C content config user.name "github-actions[bot]"
            git -C content config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C content add category-colors.json
            git -C content commit -m "Update category colors"
            git -C content push
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
